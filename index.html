    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --secondary: #888888;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Typography */
        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -2px; }
        p { color: var(--secondary); font-size: 1.1rem; max-width: 500px; margin-bottom: 30px; }

        /* Social Bar - Floating Style */
        .social-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .social-icon {
            fill: var(--secondary);
            width: 22px;
            height: 22px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon:hover {
            fill: var(--accent);
            transform: scale(1.2);
        }

        /* The Inquiry Button */
        .mail-link {
            margin-top: 40px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .mail-link:hover {
            color: var(--secondary);
            border-color: var(--secondary);
        }

        /* SVG Sizing */
        svg { width: 100%; height: 100%; }

        .content-section {
    width: 100%;
    max-width: 600px;
    margin-top: 50px;
    text-align: left; /* Aligning projects to the left looks more "pro" */
}

.section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--secondary);
    margin-bottom: 20px;
    display: block;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
}

.project-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
    text-decoration: none;
    color: var(--accent);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.2s;
}

.project-item:hover {
    padding-left: 10px;
    color: var(--secondary);
}

.project-name { font-weight: 600; font-size: 1.1rem; }
.project-type { font-size: 0.8rem; color: var(--secondary); opacity: 0.7; }

footer {
    margin-top: 80px; /* Gives the page room to breathe */
    padding-bottom: 40px;
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 20px;
    color: #444; /* Very dark grey so it fades into the background */
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.timestamp {
    font-family: monospace;
}
